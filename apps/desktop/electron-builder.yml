appId: com.labda.desktop
productName: Labda
# Custom URL scheme for magic-link deep links (labda://auth?code=…). Writes the
# CFBundleURLTypes entry into the packaged app's Info.plist.
protocols:
  - name: Labda
    schemes:
      - labda
directories:
  output: release
files:
  - dist/**/*
  - package.json
mac:
  category: public.app-category.productivity
  icon: build/icon.icns
  target:
    - target: dmg
      arch: [arm64, x64]
    - target: zip
      arch: [arm64, x64]
  darkModeSupport: true
dmg:
  sign: false
npmRebuild: false
